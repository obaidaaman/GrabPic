name: grabpic_frontend
description: GrabPic AI - Face recognition photo retrieval web application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & API
  http: ^1.1.0
  dio: ^5.4.0

  # State Management
  provider: ^6.1.1

  # Camera & Image
  camera: ^0.10.5
  image_picker: ^1.0.5
  image: ^4.1.3

  # Storage
  shared_preferences: ^2.2.2

  # UI
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9

  # Utilities
  uuid: ^4.2.2
  path_provider: ^2.1.1
  cross_file: ^0.3.3+6

  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
